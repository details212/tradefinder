name: Build Clients

# Runs on every push to main that touches the electron client,
# or manually from the Actions tab (useful for building a release).
on:
  push:
    branches: [main]
    paths: ['electron-client/**']
  workflow_dispatch:

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────────────────────
# All three jobs run in parallel.  Each uploads its artifact so you can
# download the finished installers from the Actions → Summary page.
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Windows portable .exe ──────────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: electron-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Package — Windows portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeFinder-Windows
          path: electron-client/dist-exe/TradeFinder.exe
          if-no-files-found: error
          retention-days: 30

  # ── macOS universal .dmg (Intel + Apple Silicon) ───────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: electron-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: electron-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Package — macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeFinder-macOS
          # universal build produces a single DMG
          path: electron-client/dist-exe/*.dmg
          if-no-files-found: error
          retention-days: 30

  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron-client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: electron-client/package-lock.json

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npx vite build

      - name: Package — Linux AppImage
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --linux --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradeFinder-Linux
          path: electron-client/dist-exe/*.AppImage
          if-no-files-found: error
          retention-days: 30
